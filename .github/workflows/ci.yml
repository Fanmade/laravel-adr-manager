name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style:
    name: Code style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Check style
        run: vendor/bin/pint --test

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Analyse
        run: vendor/bin/phpstan analyse --no-progress

  tests:
    name: Tests (PHP ${{ matrix.php }}, Testbench ${{ matrix.stack.testbench }}, Livewire ${{ matrix.stack.livewire }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        stack:
          - { testbench: '10.*', livewire: '3.*' } # Laravel 12
          - { testbench: '11.*', livewire: '4.*' } # Laravel 13
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
      - name: Constrain stack
        run: composer require "orchestra/testbench:${{ matrix.stack.testbench }}" "livewire/livewire:${{ matrix.stack.livewire }}" --no-update --dev
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Run tests with coverage gate
        run: vendor/bin/pest --coverage --min=100
